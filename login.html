<!doctype html>
<html class="light" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Acceso Administrativo - Sumando Voluntades</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#8a5100",
              "primary-container": "#f39200",
              secondary: "#b50062",
              "secondary-container": "#e2007c",
              surface: "#f6fafe",
              "surface-container-low": "#f0f4f8",
              "on-surface": "#171c1f",
              "on-surface-variant": "#544434",
            },
            fontFamily: {
              sans: ["Quicksand", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Quicksand", sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
  </head>
  <body
    class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-6 relative overflow-hidden"
  >
    <!-- Background decorative elements -->
    <div
      class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary-container/20 rounded-full blur-3xl"
    ></div>
    <div
      class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-secondary-container/20 rounded-full blur-3xl"
    ></div>

    <div
      class="w-full max-w-md bg-white rounded-3xl shadow-[0_20px_50px_rgba(23,28,31,0.06)] p-10 relative z-10 border border-slate-100"
    >
      <div class="text-center mb-8">
        <img
          src="Logo.png"
          alt="Logo Sumando Voluntades"
          class="h-16 mx-auto mb-6 object-contain"
        />
        <h1 class="text-2xl font-bold text-primary">Acceso Administrativo</h1>
        <p class="text-slate-500 text-sm mt-2">
          Ingresa tus credenciales para continuar al portal The Gentle Guardian.
        </p>
        <div
          class="mt-4 p-3 bg-blue-50 text-blue-700 text-xs rounded-lg border border-blue-100 text-left"
        >
          <strong class="block mb-1">Modo de prueba activado:</strong>
          Las credenciales ya han sido prellenadas para facilitarte el acceso.
          Solo haz clic en "Iniciar Sesión".
        </div>
      </div>

      <form
        action="gestion_expedientes_admin.html"
        method="GET"
        class="space-y-6"
      >
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2 ml-1"
            >Correo Electrónico</label
          >
          <div class="relative">
            <span
              class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"
              >mail</span
            >
            <input
              type="email"
              class="w-full pl-12 pr-4 py-3 bg-surface-container-low border-none rounded-full focus:ring-2 focus:ring-primary/50 transition-all outline-none"
              placeholder="admin@sumandovoluntades.org"
              value="admin@sumandovoluntades.org"
              required
            />
          </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2 ml-1"
            >Contraseña</label
          >
          <div class="relative">
            <span
              class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"
              >lock</span
            >
            <input
              type="password"
              class="w-full pl-12 pr-4 py-3 bg-surface-container-low border-none rounded-full focus:ring-2 focus:ring-primary/50 transition-all outline-none"
              placeholder="••••••••"
              value="admin123"
              required
            />
          </div>
          <div class="text-right mt-2">
            <a href="#" class="text-xs text-secondary font-bold hover:underline"
              >¿Olvidaste tu contraseña?</a
            >
          </div>
        </div>

        <button
          type="submit"
          class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-white rounded-full font-bold shadow-lg hover:shadow-primary/30 hover:scale-[1.02] active:scale-95 transition-all"
        >
          Iniciar Sesión
        </button>
      </form>

      <div class="mt-8 text-center border-t border-slate-100 pt-6">
        <a
          href="inicio.html"
          class="flex items-center justify-center gap-2 text-sm text-slate-500 hover:text-primary transition-colors font-bold"
        >
          <span class="material-symbols-outlined text-sm">arrow_back</span>
          Volver al sitio público
        </a>
      </div>
    </div>

    <div id="modalLogin" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center hidden transition-all duration-300">
      <div class="bg-white p-6 rounded-3xl max-w-sm w-full mx-4 text-center shadow-2xl">
        <div id="loginIcono" class="w-16 h-16 mx-auto mb-4 flex items-center justify-center rounded-full text-white font-bold text-3xl"></div>
        <h3 id="loginTitulo" class="text-xl font-bold mb-2 text-slate-800"></h3>
        <p id="loginMensaje" class="text-sm text-slate-500 mb-6"></p>
        <button onclick="document.getElementById('modalLogin').classList.add('hidden')" class="w-full py-3 bg-slate-800 text-white rounded-full font-bold shadow-lg hover:bg-slate-700 transition-all">
          Reintentar
        </button>
      </div>
    </div>
    
    <script>
      const API_URL = "https://sanctorum-backend.onrender.com";
    
      document.querySelector('form').addEventListener('submit', async (e) => {
          e.preventDefault();
    
          const inputs = document.querySelectorAll('input');
          const data = {
              correo: inputs[0].value,     // Primer input (Correo)
              contraseña: inputs[1].value  // Segundo input (Contraseña)
          };
    
          try {
              const response = await fetch(`${API_URL}/api/auth/login`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(data)
              });
    
              const result = await response.json();
    
              if (response.ok && result.success) {
                  // Si el login es correcto, guardamos la sesión y mandamos al dashboard
                  localStorage.setItem('token_sanctorum', result.token);
                  window.location.href = "dashboard_admin.html"; // Cambia de página automáticamente
              } else {
                  mostrarErrorModal('Error de Acceso', result.message || 'Credenciales incorrectas.');
              }
          } catch (error) {
              mostrarErrorModal('Error de Servidor', 'No se pudo conectar con la base de datos.');
          }
      });
    
      function mostrarErrorModal(titulo, mensaje) {
          document.getElementById('loginTitulo').innerText = titulo;
          document.getElementById('loginMensaje').innerText = mensaje;
          const iconoDiv = document.getElementById('loginIcono');
          iconoDiv.style.backgroundColor = '#F44336'; // Rojo de error
          iconoDiv.innerText = '✕';
          document.getElementById('modalLogin').classList.remove('hidden');
      }
    </script>
  </body>
</html>
